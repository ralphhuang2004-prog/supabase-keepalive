name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:          # Manual trigger for testing

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Query keepalive table
        run: |
          HTTP_STATUS=$(curl --silent --output /tmp/response.json \
            --write-out "%{http_code}" \
            --max-time 30 \
            --request GET \
            "https://wknlvmsgjnsiamcbntek.supabase.co/rest/v1/keepalive?limit=1&select=*" \
            --header "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            --header "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            --header "Accept: application/json")

          echo "HTTP status: $HTTP_STATUS"
          echo "Response body:"
          cat /tmp/response.json

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "ERROR: Supabase ping failed with HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "Supabase ping successful."
